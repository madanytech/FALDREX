<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support | FALDREX</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-page { padding: 160px 0 100px; background: var(--bg-soft); }
        .contact-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 50px; align-items: start; }
        .contact-info h1 { font-size: 3rem; font-weight: 800; margin-bottom: 20px; }
        .contact-info p { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 40px; }
        
        .contact-card { background: white; padding: 40px; border-radius: 24px; box-shadow: var(--shadow-subtle); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 0.9rem; }
        .input-box input, .input-box textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; font-family: inherit; }
        .input-box textarea { height: 150px; resize: none; }
        
        .contact-method { display: flex; gap: 20px; margin-bottom: 30px; }
        .method-icon { width: 50px; height: 50px; background: var(--primary-light); color: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .method-text h4 { font-weight: 700; }
        .method-text p { font-size: 0.9rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <main class="contact-page">
        <div class="container contact-grid">
            <div class="contact-info">
                <h1>Get in touch.</h1>
                <p>Have questions about an account or a boost? Our team is available 24/7 to assist you.</p>
                
                <div class="contact-method">
                    <div class="method-icon">💬</div>
                    <div class="method-text">
                        <h4>Live Discord Support</h4>
                        <p>Faldrex#0000</p>
                    </div>
                </div>
                <div class="contact-method">
                    <div class="method-icon">✉️</div>
                    <div class="method-text">
                        <h4>Email Support</h4>
                        <p>support@faldrex.com</p>
                    </div>
                </div>
            </div>

            <div class="contact-card">
                <form>
                    <div class="form-row">
                        <div class="input-box">
                            <label>Name</label>
                            <input type="text" placeholder="Your Name">
                        </div>
                        <div class="input-box">
                            <label>Email</label>
                            <input type="email" placeholder="Your Email">
                        </div>
                    </div>
                    <div class="input-box">
                        <label>Subject</label>
                        <input type="text" placeholder="Order Issue, General Question...">
                    </div>
                    <div class="input-box">
                        <label>Message</label>
                        <textarea placeholder="How can we help?"></textarea>
                    </div>
                    <button class="btn-primary-full">Send Message</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
