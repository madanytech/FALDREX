<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace | FALDREX</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <link rel="stylesheet" href="marketplace.css"> </head>
<body>

    <header class="main-header">
        <div class="container nav-bar">
            <a href="index.html" class="logo"><div class="logo-mark">F</div> FALDREX</a>
            <nav class="desktop-nav">
                <a href="index.html">Home</a>
                <a href="#market">Marketplace</a>
                <a href="#">Sell</a>
            </nav>
            <a href="#" class="btn-primary-small">Login</a>
        </div>
    </header>

    <main class="market-page">
        <section class="game-selector">
            <div class="container">
                <div class="selector-box">
                    <span>Select Game:</span>
                    <select id="game-select" class="custom-select">
                        <option value="osrs">Old School RuneScape</option>
                        <option value="wow">World of Warcraft</option>
                        <option value="lol">League of Legends</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="container shop-categories">
            <h2 class="market-title">What are you looking for?</h2>
            <div class="category-grid">
                <div class="cat-card active">
                    <div class="cat-icon">👤</div>
                    <h4>Accounts</h4>
                </div>
                <div class="cat-card">
                    <div class="cat-icon">⚔️</div>
                    <h4>Items</h4>
                </div>
                <div class="cat-card">
                    <div class="cat-icon">🪙</div>
                    <h4>Gold</h4>
                </div>
                <div class="cat-card">
                    <div class="cat-icon">🐲</div>
                    <h4>Bossing</h4>
                </div>
                <div class="cat-card">
                    <div class="cat-icon">🚀</div>
                    <h4>Power Leveling</h4>
                </div>
            </div>
        </section>

        <section class="container products-section">
            <div class="products-header">
                <h3>Available Accounts</h3>
                <div class="filters">
                    <button class="filter-btn">Filter & Sort 🔍</button>
                </div>
            </div>
            
            <div class="products-grid">
                <div class="product-card">
                    <div class="product-img-tag">Verified Account</div>
                    <div class="product-details">
                        <h4>Maxed Main - 2277 Total</h4>
                        <p>Full Achievement Diary | Infernal Cape | Pet Raid</p>
                        <div class="price-row">
                            <span class="price">$450.00</span>
                            <button class="buy-btn">View Details</button>
                        </div>
                    </div>
                </div>
                </div>
        </section>
    </main>

</body>
</html>
